[config]
## cargo-make の内蔵(core)タスクを無効化して Rust 前提の挙動を消す
skip_core_tasks = true

[env]
VERSION = "v2.0.0"
NECRO_VERSION = "dev"
NECRO_DIST = "tmp/dist"
NECRO = "tmp/dist/necro"

[tasks.default]
description = "Default: show task list"
dependencies = ["readme"]

[tasks.readme]
description = "Show available tasks"
script_runner = "bash"
script = '''
echo "--- Task List ---"

# 1) [tasks.<name>] を列挙
grep -E '^\[tasks\.[A-Za-z0-9_-]+\]$' Makefile.toml \
  | sed -E 's/^\[tasks\.([A-Za-z0-9_-]+)\]$/\1/' \
  | grep -v '^default$' \
  | while read -r t; do
      # 2) 同タスクブロック内の description を拾う（無ければ空）
      d="$(
        awk -v task="$t" '
          $0 ~ ("^\\[tasks\\." task "\\]$") { flag=1; next }
          flag && $0 ~ "^\\[" { exit }
          flag && $0 ~ "^description[[:space:]]*=" {
            sub(/^description[[:space:]]*=[[:space:]]*/, "", $0)
            gsub(/^[[:space:]]*"/, "", $0)
            gsub(/"[[:space:]]*$/, "", $0)
            print $0
            exit
          }
        ' Makefile.toml
      )"
      if [ -n "$d" ]; then
        printf "  %-20s # %s\n" "$t" "$d"
      else
        printf "  %s\n" "$t"
      fi
    done
'''

[tasks.sso_login]
description = "AWS SSO login (COM_PRD)"
script_runner = "bash"
script = "aws sso login --profile COM_PRD"

[tasks.clean]
description = "Keep latest 4 log/*.txt and remove older ones"
script_runner = "bash"
script = "ls -1t tmp/log/*.txt 2>/dev/null | tail -n +5 | xargs -r rm -f"

[tasks.build_linux]
description = "Build linux amd64"
script_runner = "bash"
script = "mkdir -p ${NECRO_DIST}; GOOS=linux GOARCH=amd64 go build -ldflags \"-s -w -X main.version=${NECRO_VERSION} -X main.commit=$(git rev-parse --short HEAD) -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)\" -o ${NECRO_DIST}/necro_linux_amd64 ."

[tasks.build_mac]
description = "Build mac (host)"
script_runner = "bash"
script = "mkdir -p ${NECRO_DIST}; go build -ldflags \"-s -w -X main.version=${NECRO_VERSION} -X main.commit=$(git rev-parse --short HEAD) -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)\" -o ${NECRO_DIST}/necro ."

[tasks.build_win]
description = "Build windows amd64"
script_runner = "bash"
script = "mkdir -p ${NECRO_DIST}; GOOS=windows GOARCH=amd64 go build -ldflags \"-s -w -X main.version=${NECRO_VERSION} -X main.commit=local -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)\" -o ${NECRO_DIST}/necro_windows_amd64.exe ."

[tasks.build]
description = "Build all (linux/mac/win)"
dependencies = ["build_linux", "build_mac", "build_win"]

[tasks.release]
description = "Create git tag and push"
script_runner = "bash"
script = "git tag ${VERSION}; git push origin ${VERSION}"

[tasks.unrelease]
description = "Delete git tag and push"
script_runner = "bash"
script = "git tag -d ${VERSION}; git push origin :refs/tags/${VERSION}"

[tasks.version]
dependencies = ["clean","build"]
description = "Show necro version"
script_runner = "bash"
script = "${NECRO} version"

[tasks.run]
dependencies = ["clean","build"]
description = "Run necro with main config"
script_runner = "bash"
script = "${NECRO} conf/necro.yml"
