  #     ]

  ## CFNスタック(更新※差分なし変更セット自動削除)
  - name: stack-update-changeset-create
    aws:
      [
        "cloudformation",
        "create-change-set",
        "--stack-name",
        "{{ .STACK_NAME }}",
        "--change-set-name",
        "{{ .CHANGE_SET_NAME }}",
        "--change-set-type",
        "UPDATE",
        "--template-body",
        "file://{{ .CFN_LOCAL }}",
        "--capabilities",
        "CAPABILITY_NAMED_IAM",
        "--parameters",
        "ParameterKey=System,ParameterValue={{ .SYSTEM }}",
        "ParameterKey=Env,ParameterValue={{ .ENV }}",
        "ParameterKey=BucketName,ParameterValue={{ .BUCKET_NAME }}",
      ]
    capture:
      CHANGE_SET_ID: "Id"
  - name: stack-update-changeset-wait
    aws:
      [
        "cloudformation",
        "wait",
        "change-set-create-complete",
        "--change-set-name",
        "{{ .CHANGE_SET_ID }}"
      ]
  - name: stack-update-changeset-describe
    aws:
      [
        "cloudformation",
        "describe-change-set",
        "--change-set-name",
        "{{ .CHANGE_SET_ID }}"
      ]
    if:
      expr: "Status"
      op: "eq"
      value: "FAILED"
    ok:
      - name: stack-update-changeset-delete-empty
        aws:
          [
            "cloudformation",
            "delete-change-set",
            "--change-set-name",
            "{{ .CHANGE_SET_ID }}"
          ]
    ng:
      - name: stack-update-changeset-exec
        aws:
          [
            "cloudformation",
            "execute-change-set",
            "--change-set-name",
            "{{ .CHANGE_SET_ID }}"
          ]
      - name: stack-update-wait
        aws:
          [
            "cloudformation",
            "wait",
            "stack-update-complete",
            "--stack-name",
            "{{ .STACK_NAME }}"
          ]

