version: 1

defaults:
  region: ap-northeast-1

targets:
  profiles: # 空なら ~/.aws/config から自動取得
    [
      "COM_PRD"
    ] 
  exclude:
    - SAMPLE_PROFILE

vars: # build-in var: PROFILE, REGION, ACCOUNT_ID, RUN_ID
  # template-resolve-limit: 10

  defaults:
    SYSTEM: '{{ (splitList "_" .PROFILE | first | lower) }}'
    ENV: '{{ (splitList "_" .PROFILE | last  | lower) }}'

    ## cfn-stack
    CFN_LOCAL: 'conf/sample/account/com_prd/stack-SYSTEM-ENV.yml'
    STACK_NAME: 'stack-{{ .SYSTEM }}-{{ .ENV }}'
    CHANGE_SET_NAME: 'cs-{{ .RUN_ID }}'

    ## s3-bucket
    BUCKET_NAME: "s3-{{ .SYSTEM }}-{{ .ENV }}-artifact"

    ## s3-file
    S3_LOCAL: 'conf/sample/account/com_prd/.gitkeep'
    S3_REMOTE: 'tmp/.gitkeep'

  # profiles:
  #   COM_PRD:
  #     SYSTEM: com
  #     ENV: prd

