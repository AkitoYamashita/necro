version: 1

defaults:
  region: ap-northeast-1

targets:
  profiles: # 空なら ~/.aws/config から自動取得
    [
      # "COM_PRD"
    ] 
  exclude:
    - SAMPLE_PROFILE

vars: # build-in var: PROFILE, REGION, ACCOUNT_ID, RUN_ID
  # template-resolve-limit: 10

  defaults:
    SYSTEM: '{{ (splitList "_" .PROFILE | first | lower) }}'
    ENV: '{{ (splitList "_" .PROFILE | last  | lower) }}'

    ## cfn-stack
    CFN_LOCAL: 'conf/sample/aws/cfn/stack-necro.yml'
    STACK_NAME: 'stack-necro'
    CHANGE_SET_NAME: 'cs-{{ .RUN_ID }}'

    ## cfn-param
    BUCKET_NAME: 's3-{{ .SYSTEM }}-{{ .ENV }}-artifact'
    ROLE_NAME: 'role-{{ .SYSTEM }}-{{ .ENV }}-assumable'
    # TRUSTED_ACCOUNT_ID: '123456789012'
    # TRUSTED_ACCOUNT_ID: ''

  # profiles:
  #   COM_PRD:
  #     SYSTEM: com
  #     ENV: prd

cmd:
  ## CFNスタック(作成)
  # - name: stack-deploy
  #   aws:
  #     [
  #       "cloudformation",
  #       "deploy",
  #       "--stack-name",
  #       "{{ .STACK_NAME }}",
  #       "--template-file",
  #       "{{ .CFN_LOCAL }}",
  #       "--capabilities",
  #       "CAPABILITY_NAMED_IAM",
  #       "--parameter-overrides",
  #       "System={{ .SYSTEM }}",
  #       "Env={{ .ENV }}",
  #       "RoleName={{ .ROLE_NAME }}",
  #       "BucketName={{ .BUCKET_NAME }}",
  #       "TrustedAccountId={{ .TRUSTED_ACCOUNT_ID }}",
  #     ]

  ## CFNスタック(更新※差分なし変更セット自動削除)
  - name: stack-update-changeset-create
    aws:
      [
        "cloudformation",
        "create-change-set",
        "--stack-name",
        "{{ .STACK_NAME }}",
        "--change-set-name",
        "{{ .CHANGE_SET_NAME }}",
        "--change-set-type",
        "UPDATE",
        "--template-body",
        "file://{{ .CFN_LOCAL }}",
        "--capabilities",
        "CAPABILITY_NAMED_IAM",
        "--parameters",
        "ParameterKey=System,ParameterValue={{ .SYSTEM }}",
        "ParameterKey=Env,ParameterValue={{ .ENV }}",
        "ParameterKey=RoleName,ParameterValue={{ .ROLE_NAME }}",
        "ParameterKey=BucketName,ParameterValue={{ .BUCKET_NAME }}",
        "ParameterKey=TrustedAccountId,ParameterValue={{ .TRUSTED_ACCOUNT_ID }}",
      ]
    capture:
      CHANGE_SET_ID: "Id"
  - name: stack-update-changeset-wait
    aws:
      [
        "cloudformation",
        "wait",
        "change-set-create-complete",
        "--change-set-name",
        "{{ .CHANGE_SET_ID }}"
      ]
  - name: stack-update-changeset-describe
    aws:
      [
        "cloudformation",
        "describe-change-set",
        "--change-set-name",
        "{{ .CHANGE_SET_ID }}"
      ]
    if:
      expr: "Status"
      op: "eq"
      value: "FAILED"
    ok:
      - name: stack-update-changeset-delete-empty
        aws:
          [
            "cloudformation",
            "delete-change-set",
            "--change-set-name",
            "{{ .CHANGE_SET_ID }}"
          ]
    ng:
      - name: stack-update-changeset-exec
        aws:
          [
            "cloudformation",
            "execute-change-set",
            "--change-set-name",
            "{{ .CHANGE_SET_ID }}"
          ]
      - name: stack-update-wait
        aws:
          [
            "cloudformation",
            "wait",
            "stack-update-complete",
            "--stack-name",
            "{{ .STACK_NAME }}"
          ]

