AWSTemplateFormatVersion: "2010-09-09"
Description: "necro assume role"

Parameters:
  System:
    Type: String
  Env:
    Type: String
  RoleName:
    Type: String
  BucketName:
    Type: String
  TrustedAccountId:
    Type: String

Resources:
  NecroAssumeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAssumeFromTrustedRoot
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TrustedAccountId}:root"
            Action: "sts:AssumeRole"

      ## AWS managed policies (ReadOnly)
      ManagedPolicyArns:
        # - "arn:aws:iam::aws:policy/AdministratorAccess"
        # - "arn:aws:iam::aws:policy/ReadOnlyAccess"
        - "arn:aws:iam::aws:policy/job-function/ViewOnlyAccess"

      ## Inline policy (Full access to the specific bucket)
      Policies:
        - PolicyName: "inline-001"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3ListAllMyBucketsAccess
                Effect: Allow
                Action:
                  - "s3:ListAllMyBuckets"
                Resource: "*"
              - Sid: S3BucketAccess
                Effect: Allow
                Action:
                  ## bucket listing / location
                  - "s3:ListBucket"
                  - "s3:ListBucketVersions"
                  - "s3:ListBucketMultipartUploads"
                  - "s3:GetBucketLocation"
                  ## bucket policy / public access / ownership / acl
                  - "s3:GetBucketPolicy"
                  - "s3:PutBucketPolicy"
                  - "s3:DeleteBucketPolicy"
                  - "s3:GetBucketPolicyStatus"
                  - "s3:GetBucketPublicAccessBlock"
                  - "s3:PutBucketPublicAccessBlock"
                  - "s3:GetBucketOwnershipControls"
                  - "s3:PutBucketOwnershipControls"
                  - "s3:GetBucketAcl"
                  - "s3:PutBucketAcl"
                  ## encryption / versioning / tags
                  - "s3:GetEncryptionConfiguration"
                  - "s3:PutEncryptionConfiguration"
                  - "s3:GetBucketVersioning"
                  - "s3:PutBucketVersioning"
                  - "s3:GetBucketTagging"
                  - "s3:PutBucketTagging"
                  - "s3:DeleteBucketTagging"
                  ## lifecycle / logging / notification
                  - "s3:GetLifecycleConfiguration"
                  - "s3:PutLifecycleConfiguration"
                  - "s3:DeleteLifecycleConfiguration"
                  - "s3:GetBucketLogging"
                  - "s3:PutBucketLogging"
                  - "s3:GetBucketNotification"
                  - "s3:PutBucketNotification"
                  ## cors / website
                  - "s3:GetBucketCORS"
                  - "s3:PutBucketCORS"
                  - "s3:DeleteBucketCORS"
                  - "s3:GetBucketWebsite"
                  - "s3:PutBucketWebsite"
                  - "s3:DeleteBucketWebsite"
                  ## request payment / accelerate
                  - "s3:GetBucketRequestPayment"
                  - "s3:PutBucketRequestPayment"
                  - "s3:GetAccelerateConfiguration"
                  - "s3:PutAccelerateConfiguration"
                  ## replication
                  - "s3:GetReplicationConfiguration"
                  - "s3:PutReplicationConfiguration"
                  - "s3:DeleteReplicationConfiguration"
                  ## inventory / analytics / metrics / intelligent-tiering
                  - "s3:GetInventoryConfiguration"
                  - "s3:PutInventoryConfiguration"
                  - "s3:DeleteInventoryConfiguration"
                  - "s3:GetAnalyticsConfiguration"
                  - "s3:PutAnalyticsConfiguration"
                  - "s3:DeleteAnalyticsConfiguration"
                  - "s3:GetMetricsConfiguration"
                  - "s3:PutMetricsConfiguration"
                  - "s3:DeleteMetricsConfiguration"
                  - "s3:GetIntelligentTieringConfiguration"
                  - "s3:PutIntelligentTieringConfiguration"
                  - "s3:DeleteIntelligentTieringConfiguration"
                  ## object lock
                  - "s3:GetObjectLockConfiguration"
                  - "s3:PutObjectLockConfiguration"
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}"
              - Sid: S3ObjectsAccess
                Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:GetObjectVersion"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                  - "s3:DeleteObjectVersion"
                  - "s3:AbortMultipartUpload"
                  - "s3:ListMultipartUploadParts"
                  - "s3:GetObjectTagging"
                  - "s3:PutObjectTagging"
                  - "s3:DeleteObjectTagging"
                  - "s3:GetObjectAcl"
                  - "s3:PutObjectAcl"
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}/*"
