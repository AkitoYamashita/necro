version: 1

defaults:
  region: ap-northeast-1

targets:
  profiles: # 空なら ~/.aws/config から自動取得
    [
      "COM_PRD"
    ] 
  exclude:
    - SAMPLE_PROFILE

vars: # build-in var: PROFILE, REGION, ACCOUNT_ID, RUN_ID
  # template-resolve-limit: 10

  defaults:
    SYSTEM: '{{ (splitList "_" .PROFILE | first | lower) }}'
    ENV: '{{ (splitList "_" .PROFILE | last  | lower) }}'

    ## s3-bucket
    BUCKET_NAME: 's3-reference'

cmd:

  # ## S3バケット(作成)
  # - name: s3-bucket-create
  #   aws:
  #     [
  #       "s3api",
  #       "create-bucket",
  #       "--bucket",
  #       "{{ .BUCKET_NAME }}",
  #       "--create-bucket-configuration",
  #       "LocationConstraint={{ .REGION }}",
  #     ]

  ## S3バケット(一覧)
  - name: s3-bucket-list
    aws: ["s3api", "list-buckets"]

  # ## S3バケット(確認)
  # - name: s3-bucket-check
  #   aws:
  #     [
  #       "s3api",
  #       "head-bucket",
  #       "--bucket",
  #       "{{ .BUCKET_NAME }}",
  #     ]

  ## S3オブジェクト(ツリー風)
  - name: s3-tree
    aws:
      [
        "s3",
        "ls",
        "s3://{{ .BUCKET_NAME }}",
        "--recursive"
      ]

  # ## S3バケット(空にする)
