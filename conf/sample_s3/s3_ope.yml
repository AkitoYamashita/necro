version: 1

defaults:
  region: ap-northeast-1

targets:
  profiles: # 空なら ~/.aws/config から自動取得
    [
      "COM_PRD"
    ] 
  exclude:
    - SAMPLE_PROFILE

vars: # build-in var: PROFILE, REGION, ACCOUNT_ID, RUN_ID
  # template-resolve-limit: 10

  defaults:
    SYSTEM: '{{ (splitList "_" .PROFILE | first | lower) }}'
    ENV: '{{ (splitList "_" .PROFILE | last  | lower) }}'

    ## s3-bucket
    BUCKET_NAME: 's3-{{ .SYSTEM }}-{{ .ENV }}-necro-artifact'

    ## s3-file
    # CFN_LOCAL: 'conf/cfn_stack-SYSTEM-ENV-necro.yml'
    CFN_LOCAL: 'conf/sample_s3/.gitkeep'
    # CFN_REMOTE: 'stack-{{ .SYSTEM }}-{{ .ENV }}-necro.yml'
    CFN_REMOTE: 'tmp/.gitkeep'

  # profiles:
